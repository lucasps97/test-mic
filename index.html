<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste de Áudio & Vídeo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ffaa;
    --accent2: #ff3366;
    --accent3: #7b61ff;
    --text: #e8e8f0;
    --muted: #4a4a6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2rem 1rem 4rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(123,97,255,0.07) 0%, transparent 70%);
    top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 720px;
    display: flex; flex-direction: column;
    align-items: center; gap: 1.5rem;
  }

  header { text-align: center; }

  .label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.3em;
    color: var(--accent); text-transform: uppercase; margin-bottom: 0.4rem;
  }

  h1 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 800; letter-spacing: -0.02em; line-height: 1;
  }
  h1 span { color: var(--accent); }

  .mode-switcher {
    display: flex; gap: 0.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 0.3rem;
  }

  .mode-btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.55rem 1.4rem; border-radius: 7px; border: none;
    cursor: pointer; background: transparent; color: var(--muted);
    transition: all 0.2s; font-weight: 700;
  }
  .mode-btn.active { background: var(--accent); color: #000; }

  .camera-section {
    width: 100%; border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border); background: #000;
    position: relative; display: none; aspect-ratio: 16/9;
  }
  .camera-section.visible { display: block; }

  #cameraPreview {
    width: 100%; height: 100%;
    object-fit: cover; display: block; transform: scaleX(-1);
  }

  .cam-overlay {
    position: absolute; top: 0.75rem; left: 0.75rem;
    display: flex; align-items: center; gap: 0.4rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,255,255,0.8);
    background: rgba(0,0,0,0.55); padding: 0.3rem 0.6rem; border-radius: 4px;
  }

  .cam-rec-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent2); display: none; animation: blink 1s infinite;
  }
  .cam-rec-dot.show { display: block; }

  .level-section {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem 1.5rem;
  }

  .level-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.25em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 0.8rem;
    display: flex; justify-content: space-between;
  }
  #level-value { color: var(--accent); transition: color 0.1s; }

  .meter-bar {
    width: 100%; height: 16px; background: #0d0d1a;
    border-radius: 4px; overflow: hidden; border: 1px solid var(--border);
  }
  #meter-fill {
    height: 100%; width: 0%; border-radius: 4px;
    background: linear-gradient(90deg, var(--accent) 0%, #00cc88 60%, #ffcc00 80%, var(--accent2) 100%);
    transition: width 0.05s ease-out; box-shadow: 0 0 10px rgba(0,255,170,0.4);
  }

  .viz-section {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
  }
  #waveCanvas { width: 100%; height: 100px; display: block; }

  .controls {
    display: flex; gap: 0.75rem;
    align-items: center; flex-wrap: wrap; justify-content: center;
  }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.85rem 1.8rem; border-radius: 8px; border: none;
    cursor: pointer; transition: all 0.2s; font-weight: 700;
  }

  #btn-record { background: var(--accent); color: #000; }
  #btn-record:hover:not(:disabled) { background: #00cc88; transform: translateY(-1px); box-shadow: 0 0 20px rgba(0,255,170,0.3); }
  #btn-record.recording { background: var(--accent2); color: #fff; animation: pulse-record 1s infinite; }
  #btn-record:disabled { opacity: 0.4; cursor: not-allowed; }

  @keyframes pulse-record {
    0%, 100% { box-shadow: 0 0 10px rgba(255,51,102,0.3); }
    50% { box-shadow: 0 0 25px rgba(255,51,102,0.6); }
  }

  #btn-stop { background: transparent; color: var(--text); border: 1px solid var(--border); }
  #btn-stop:hover:not(:disabled) { border-color: var(--muted); transform: translateY(-1px); }
  #btn-stop:disabled { opacity: 0.3; cursor: not-allowed; }

  .status {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); display: flex; align-items: center; gap: 0.45rem;
  }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.active { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: blink 1s infinite; }
  .dot.ready { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .timer {
    font-family: 'Space Mono', monospace;
    font-size: 1.3rem; font-weight: 700; color: var(--accent2);
    letter-spacing: 0.05em; min-width: 65px; text-align: center;
  }
  .timer.hidden { display: none; }

  .recordings-section { width: 100%; }

  .recordings-header {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.25em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 0.75rem;
    display: flex; justify-content: space-between;
  }

  #recordings-list {
    display: flex; flex-direction: column; gap: 0.6rem;
    max-height: 360px; overflow-y: auto;
  }
  #recordings-list::-webkit-scrollbar { width: 4px; }
  #recordings-list::-webkit-scrollbar-track { background: transparent; }
  #recordings-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .recording-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.9rem 1rem;
    display: flex; align-items: center; gap: 0.75rem;
    animation: slide-in 0.3s ease-out; flex-wrap: wrap;
  }
  .recording-item.has-video { flex-direction: column; align-items: stretch; }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .rec-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem; letter-spacing: 0.1em;
    padding: 0.2rem 0.5rem; border-radius: 4px; text-transform: uppercase; flex-shrink: 0;
  }
  .rec-badge.audio { background: rgba(0,255,170,0.1); color: var(--accent); border: 1px solid rgba(0,255,170,0.2); }
  .rec-badge.video { background: rgba(123,97,255,0.1); color: var(--accent3); border: 1px solid rgba(123,97,255,0.2); }

  .rec-number { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); min-width: 18px; flex-shrink: 0; }
  .rec-duration { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--accent); min-width: 36px; text-align: right; flex-shrink: 0; }

  .rec-audio { flex: 1; height: 32px; filter: invert(1) hue-rotate(90deg) brightness(0.7); border-radius: 4px; display: block; min-width: 0; }
  .rec-video { width: 100%; max-height: 180px; background: #000; border-radius: 6px; display: block; }

  .rec-video-top { display: flex; align-items: center; gap: 0.6rem; }
  .spacer { flex: 1; }

  .btn-sm {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 0.3rem 0.55rem; border-radius: 6px;
    cursor: pointer; font-size: 0.7rem; transition: all 0.2s; line-height: 1;
  }
  .btn-sm.dl:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.del:hover { border-color: var(--accent2); color: var(--accent2); }

  .empty-state {
    font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--muted);
    text-align: center; padding: 1.5rem; border: 1px dashed var(--border);
    border-radius: 8px; letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <p class="label">// diagnóstico de mídia</p>
    <h1>TESTE DE ÁUDIO<br><span>& VÍDEO</span></h1>
  </header>

  <div class="mode-switcher">
    <button class="mode-btn active" id="mode-audio" onclick="setMode('audio')">🎙 Só Áudio</button>
    <button class="mode-btn" id="mode-video" onclick="setMode('video')">🎥 Áudio + Vídeo</button>
  </div>

  <div class="camera-section" id="cameraSection">
    <video id="cameraPreview" autoplay muted playsinline></video>
    <div class="cam-overlay">
      <div class="cam-rec-dot" id="camDot"></div>
      <span id="camLabel">Pré-visualização</span>
    </div>
  </div>

  <div class="level-section">
    <div class="level-label">
      <span>Nível de entrada (mic)</span>
      <span id="level-value">— dB</span>
    </div>
    <div class="meter-bar"><div id="meter-fill"></div></div>
  </div>

  <div class="viz-section">
    <canvas id="waveCanvas"></canvas>
  </div>

  <div class="controls">
    <div class="status">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Aguardando</span>
    </div>
    <span class="timer hidden" id="timer">00:00</span>
    <button class="btn" id="btn-record">⏺ Gravar</button>
    <button class="btn" id="btn-stop" disabled>⏹ Parar</button>
  </div>

  <div class="recordings-section">
    <div class="recordings-header">
      <span>Gravações</span>
      <span id="rec-count">0 arquivo(s)</span>
    </div>
    <div id="recordings-list">
      <div class="empty-state">Nenhuma gravação ainda</div>
    </div>
  </div>
</div>

<script>
  const btnRecord = document.getElementById('btn-record');
  const btnStop = document.getElementById('btn-stop');
  const meterFill = document.getElementById('meter-fill');
  const levelValue = document.getElementById('level-value');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const timerEl = document.getElementById('timer');
  const recList = document.getElementById('recordings-list');
  const recCount = document.getElementById('rec-count');
  const canvas = document.getElementById('waveCanvas');
  const ctx2d = canvas.getContext('2d');
  const cameraSection = document.getElementById('cameraSection');
  const cameraPreview = document.getElementById('cameraPreview');
  const camDot = document.getElementById('camDot');
  const camLabel = document.getElementById('camLabel');

  let audioCtx, analyser, source;
  let audioStream, videoStream, combinedStream;
  let mediaRecorder, chunks = [];
  let recordings = [];
  let animFrame;
  let timerInterval, startTime;
  let recIndex = 0;
  let currentMode = 'audio';

  function resizeCanvas() {
    canvas.width = canvas.offsetWidth * devicePixelRatio;
    canvas.height = canvas.offsetHeight * devicePixelRatio;
    ctx2d.scale(devicePixelRatio, devicePixelRatio);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  window.setMode = async function(mode) {
    if (mode === currentMode) return;
    currentMode = mode;
    document.getElementById('mode-audio').classList.toggle('active', mode === 'audio');
    document.getElementById('mode-video').classList.toggle('active', mode === 'video');

    if (audioStream) { audioStream.getTracks().forEach(t => t.stop()); audioStream = null; }
    if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
    combinedStream = null;
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    cancelAnimationFrame(animFrame);

    cameraSection.classList.toggle('visible', mode === 'video');
    setStatus('idle', 'Aguardando');
    await initStreams();
  };

  async function initStreams() {
    try {
      if (currentMode === 'audio') {
        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        combinedStream = audioStream;
      } else {
        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        videoStream = await navigator.mediaDevices.getUserMedia({ audio: false, video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } });
        cameraPreview.srcObject = videoStream;
        combinedStream = new MediaStream([...audioStream.getTracks(), ...videoStream.getTracks()]);
      }

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 1024;
      analyser.smoothingTimeConstant = 0.6;
      source = audioCtx.createMediaStreamSource(audioStream);
      source.connect(analyser);

      setStatus('ready', currentMode === 'video' ? 'Câmera + Mic ativos' : 'Microfone ativo');
      draw();
    } catch(e) {
      console.error(e);
      setStatus('error', 'Sem permissão');
      alert('Permita o acesso ao microfone' + (currentMode === 'video' ? ' e câmera' : '') + ' para continuar.');
    }
  }

  function setStatus(state, text) {
    statusText.textContent = text;
    statusDot.className = 'dot';
    if (state === 'ready') statusDot.classList.add('ready');
    if (state === 'recording') statusDot.classList.add('active');
  }

  function draw() {
    animFrame = requestAnimationFrame(draw);
    if (!analyser) return;
    const W = canvas.offsetWidth, H = canvas.offsetHeight;
    const bufLen = analyser.frequencyBinCount;
    const td = new Uint8Array(bufLen);
    analyser.getByteTimeDomainData(td);

    ctx2d.clearRect(0, 0, W, H);
    ctx2d.strokeStyle = 'rgba(0,255,170,0.7)';
    ctx2d.lineWidth = 1.5;
    ctx2d.shadowColor = '#00ffaa';
    ctx2d.shadowBlur = 6;
    ctx2d.beginPath();
    const sw = W / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const y = (td[i] / 128.0) * H / 2;
      i === 0 ? ctx2d.moveTo(x, y) : ctx2d.lineTo(x, y);
      x += sw;
    }
    ctx2d.lineTo(W, H / 2);
    ctx2d.stroke();
    ctx2d.shadowBlur = 0;

    const fd = new Uint8Array(bufLen);
    analyser.getByteFrequencyData(fd);
    let sum = 0;
    for (let i = 0; i < fd.length; i++) sum += fd[i];
    const avg = sum / fd.length;
    const pct = Math.min(100, (avg / 128) * 100 * 2.5);
    meterFill.style.width = pct + '%';
    levelValue.textContent = avg > 0 ? (20 * Math.log10(avg / 128)).toFixed(1) + ' dB' : '— dB';
    levelValue.style.color = pct > 80 ? '#ff3366' : pct > 50 ? '#ffcc00' : '#00ffaa';
  }

  function startTimer() {
    startTime = Date.now();
    timerEl.classList.remove('hidden');
    timerInterval = setInterval(() => {
      const e = Date.now() - startTime;
      timerEl.textContent = `${String(Math.floor(e/60000)).padStart(2,'0')}:${String(Math.floor((e%60000)/1000)).padStart(2,'0')}`;
    }, 500);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerEl.classList.add('hidden');
    timerEl.textContent = '00:00';
  }

  btnRecord.addEventListener('click', async () => {
    if (!combinedStream) await initStreams();
    if (!combinedStream) return;

    chunks = [];
    const isVideo = currentMode === 'video';
    const preferred = isVideo ? 'video/webm;codecs=vp8,opus' : 'audio/webm';
    const opts = MediaRecorder.isTypeSupported(preferred) ? { mimeType: preferred } : {};
    mediaRecorder = new MediaRecorder(combinedStream, opts);
    mediaRecorder.ondataavailable = e => e.data.size > 0 && chunks.push(e.data);
    mediaRecorder.onstop = saveRecording;
    mediaRecorder.start(100);

    btnRecord.disabled = true;
    btnRecord.classList.add('recording');
    btnRecord.textContent = '● Gravando...';
    btnStop.disabled = false;
    setStatus('recording', 'Gravando');
    startTimer();
    if (isVideo) { camDot.classList.add('show'); camLabel.textContent = 'Gravando'; }
  });

  btnStop.addEventListener('click', () => {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    btnRecord.disabled = false;
    btnRecord.classList.remove('recording');
    btnRecord.textContent = '⏺ Gravar';
    btnStop.disabled = true;
    setStatus('ready', currentMode === 'video' ? 'Câmera + Mic ativos' : 'Microfone ativo');
    stopTimer();
    camDot.classList.remove('show');
    camLabel.textContent = 'Pré-visualização';
  });

  function saveRecording() {
    const isVideo = currentMode === 'video';
    const blob = new Blob(chunks, { type: isVideo ? 'video/webm' : 'audio/webm' });
    const url = URL.createObjectURL(blob);
    const duration = ((Date.now() - startTime) / 1000).toFixed(1);
    recIndex++;
    recordings.push({ url, duration, index: recIndex, blob, isVideo });
    renderList();
  }

  function renderList() {
    recCount.textContent = `${recordings.length} arquivo(s)`;
    if (!recordings.length) {
      recList.innerHTML = '<div class="empty-state">Nenhuma gravação ainda</div>';
      return;
    }
    recList.innerHTML = '';
    recordings.forEach((rec, i) => {
      const item = document.createElement('div');
      item.className = 'recording-item' + (rec.isVideo ? ' has-video' : '');
      if (rec.isVideo) {
        item.innerHTML = `
          <div class="rec-video-top">
            <span class="rec-number">#${rec.index}</span>
            <span class="rec-badge video">Vídeo</span>
            <span class="spacer"></span>
            <span class="rec-duration">${rec.duration}s</span>
            <button class="btn-sm dl" onclick="downloadRec(${i})">⬇</button>
            <button class="btn-sm del" onclick="deleteRec(${i})">✕</button>
          </div>
          <video class="rec-video" controls src="${rec.url}" style="transform:scaleX(-1)"></video>
        `;
      } else {
        item.innerHTML = `
          <span class="rec-number">#${rec.index}</span>
          <span class="rec-badge audio">Áudio</span>
          <audio class="rec-audio" controls src="${rec.url}"></audio>
          <span class="rec-duration">${rec.duration}s</span>
          <button class="btn-sm dl" onclick="downloadRec(${i})">⬇</button>
          <button class="btn-sm del" onclick="deleteRec(${i})">✕</button>
        `;
      }
      recList.appendChild(item);
    });
  }

  window.downloadRec = function(i) {
    const rec = recordings[i];
    const a = document.createElement('a');
    a.href = rec.url;
    a.download = `gravacao-${rec.index}.webm`;
    a.click();
  };

  window.deleteRec = function(i) {
    URL.revokeObjectURL(recordings[i].url);
    recordings.splice(i, 1);
    renderList();
  };

  initStreams();
</script>
</body>
</html>
